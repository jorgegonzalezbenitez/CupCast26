# docker-compose.yml
# ==================
# Entorno de desarrollo local.
# Uso:
#   docker-compose up --build        → construye y arranca
#   docker-compose up -d             → en background
#   docker-compose logs -f           → ver logs en tiempo real
#   docker-compose down              → parar y eliminar contenedores

version: "3.9"

services:
  cupcast26:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cupcast26
    ports:
      - "8000:8000"
    environment:
      - CUPCAST_API_KEY=cupcast2026       # cambiar en producción
      - N_SIMULATIONS=50000
      - REFRESH_HOURS=6
    volumes:
      # Montar data/ para persistir el CSV entre reinicios
      - ./data:/app/data
      # Montar outputs/ para ver los gráficos generados
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s